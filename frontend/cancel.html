<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled - TimelessPages</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: #12110e;
            color: #f5f0eb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .cancel-card {
            background: #1a1814;
            padding: 4rem 2rem;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid #333;
        }
        .cancel-icon {
            font-size: 5rem;
            color: #e74c3c;
            margin-bottom: 2rem;
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #fff;
        }
        p {
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: #8B7355;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #a08060;
        }
        .secondary-btn {
            background: transparent;
            border: 1px solid #444;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="cancel-card">
        <div class="cancel-icon">❌</div>
        <h1>Payment Cancelled</h1>
        <p>The payment process was cancelled or failed. Your cart items are still safe!</p>
        <a href="index.html" class="btn">Return to Shop</a>
    </div>
</body>
</html>
